name: Train Model (Python)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: dsai-main-writers
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  train_python:
    runs-on: ubuntu-latest
    steps:
      - name: CHECKOUT REPOSITORY
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: SETUP PYTHON
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: CACHE PIP PACKAGES
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-train-${{ hashFiles('.github/workflows/12-train-python.yml') }}
          restore-keys: |
            ${{ runner.os }}-pip-train-
            ${{ runner.os }}-pip-

      - name: INSTALL PYTHON DEPENDENCIES
        run: pip install pandas scikit-learn xgboost

      - name: RUN TRAINING JOB
        working-directory: agents-new
        run: python3 02_train_model.py

      - name: UPLOAD MODEL ARTIFACT
        uses: actions/upload-artifact@v4
        with:
          name: xgboost-model
          path: agents-new/data/modelpy.json

      - name: COMMIT CHANGES
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add agents-new/data/modelpy.json agents-new/data/validationpy.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: retrain model $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
